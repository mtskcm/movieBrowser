name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "ERROR: .env.example is missing!"
            exit 1
          fi
          echo ".env.example exists ✓"

      - name: Verify API key is not hardcoded
        run: |
          if grep -r "EXPO_PUBLIC_TMDB_API_KEY=" src/ --include="*.ts" --include="*.tsx" | grep -v "process.env"; then
            echo "ERROR: Hardcoded API key detected in source files!"
            exit 1
          fi
          echo "No hardcoded API key found ✓"

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
